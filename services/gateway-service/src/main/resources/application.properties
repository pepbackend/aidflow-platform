spring.application.name=gateway-service
server.port=8080

identity-service.base-url=http://localhost:8081
campaign-service.base-url=http://localhost:8082

spring.cloud.gateway.server.webflux.routes[0].id=identity-auth
spring.cloud.gateway.server.webflux.routes[0].uri=${identity-service.base-url}
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.server.webflux.routes[1].id=campaign-service
spring.cloud.gateway.server.webflux.routes[1].uri=${campaign-service.base-url}
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/campaigns/**
