spring.application.name=campaign-service
server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5432/campaign_service
spring.datasource.username=aidflow
spring.datasource.password=aidflow

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

campaign.events.campaign-created-topic=campaign-created
campaign.outbox.publisher.enabled=true
campaign.outbox.publisher-fixed-delay=5000
campaign.outbox.batch-size=50
