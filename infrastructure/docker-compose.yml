services:
  postgres:
    image: postgres:16-alpine
    container_name: aidflow-postgres
    environment:
      POSTGRES_USER: aidflow
      POSTGRES_PASSWORD: aidflow
      POSTGRES_DB: aidflow
    ports:
      - "5432:5432"
    volumes:
      - aidflow-postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - aidflow-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aidflow -d aidflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  redpanda:
    image: redpandadata/redpanda:latest
    container_name: aidflow-redpanda
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp
      - "1"
      - --memory
      - 512M
      - --reserve-memory
      - 0M
      - --node-id
      - "0"
      - --check=false
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092
    ports:
      - "9092:9092"
      - "9644:9644"
    networks:
      - aidflow-network
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health", "--exit-when-healthy"]
      interval: 10s
      timeout: 5s
      retries: 12

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: aidflow-kafka-ui
    environment:
      KAFKA_CLUSTERS_0_NAME: aidflow-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: redpanda:9092
    ports:
      - "8085:8080"
    depends_on:
      - redpanda
    networks:
      - aidflow-network

  identity-service:
    build:
      context: ../services/identity-service
    container_name: aidflow-identity-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/identity_service
      SPRING_DATASOURCE_USERNAME: aidflow
      SPRING_DATASOURCE_PASSWORD: aidflow
      AUTH_JWT_SECRET: local-compose-secret-local-compose-secret-identity
      AUTH_JWT_EXPIRATION_SECONDS: 900
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - aidflow-network
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/localhost/8081'"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  campaign-service:
    build:
      context: ../services/campaign-service
    container_name: aidflow-campaign-service
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/campaign_service
      SPRING_DATASOURCE_USERNAME: aidflow
      SPRING_DATASOURCE_PASSWORD: aidflow
      SPRING_KAFKA_BOOTSTRAP_SERVERS: redpanda:9092
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    networks:
      - aidflow-network
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/localhost/8082'"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  gateway-service:
    build:
      context: ../services/gateway-service
    container_name: aidflow-gateway-service
    environment:
      IDENTITY_SERVICE_BASE_URL: http://identity-service:8081
      CAMPAIGN_SERVICE_BASE_URL: http://campaign-service:8082
    ports:
      - "8080:8080"
    depends_on:
      identity-service:
        condition: service_healthy
      campaign-service:
        condition: service_healthy
    networks:
      - aidflow-network

volumes:
  aidflow-postgres-data:

networks:
  aidflow-network:
    name: aidflow-network
