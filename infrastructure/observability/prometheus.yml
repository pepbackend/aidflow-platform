global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: cadvisor
    static_configs:
      - targets:
          - cadvisor:8080

  - job_name: gateway-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - gateway-service:8080

  - job_name: identity-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - identity-service:8081

  - job_name: campaign-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - campaign-service:8082
